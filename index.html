<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Party!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="birthday-text">
        <h1>🎉 Happy Birthday! 🎉</h1>
        <div class="subtitle">Veel plezier met je dag!</div>
    </div>
    
    <!-- Cake Selector -->
    <div id="cake-selector">
        <button class="cake-btn" data-cake="🎂">🎂</button>
        <button class="cake-btn" data-cake="🍰">🍰</button>
        <button class="cake-btn" data-cake="🧁">🧁</button>
        <button class="cake-btn" data-cake="🥧">🥧</button>
        <button class="cake-btn" data-cake="🍩">🍩</button>
        <button class="cake-btn" data-cake="🎂🕯️">🎂🕯️</button>
    </div>
    
    <!-- Blow Mode Toggle -->
    <button id="blow-toggle" class="blow-toggle-btn">🎤 Blaas: UIT</button>
    
    <div id="timer">60</div>
    
    <!-- Audio element for music -->
    <audio id="default-song" preload="auto">
        <source src="birthday.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Config Panel -->
    <div id="config-panel">
        <h2>⚙️ Instellingen</h2>
        <label>
            Naam:
            <input type="text" id="name-input" placeholder="Naam">
        </label>
        <label>
            Duur (seconden):
            <input type="number" id="duration-input" value="60" min="10" max="300">
        </label>
        <label>
            Muziek URL (optioneel):
            <input type="text" id="music-url" placeholder="https://...">
        </label>
        <label>
            Kies een taart:
            <select id="cake-select">
                <option value="🎂">Chocolade Taart 🎂</option>
                <option value="🍰">Slagroom Taart 🍰</option>
                <option value="🧁">Cupcake 🧁</option>
                <option value="🥧">Appeltaart 🥧</option>
                <option value="🍩">Donut 🍩</option>
                <option value="🎂🕯️">Taart met Kaarsjes 🎂🕯️</option>
            </select>
        </label>
        <label>
            <input type="checkbox" id="blow-mode">
            Blaas op de kaarsen! (microfoon vereist)
        </label>
        <button id="start-btn">Start! 🎉</button>
        <button id="close-config">Sluiten</button>
    </div>
    
    <div id="open-config">⚙️</div>

    <script src="app.js"></script>
</body>
</html>
