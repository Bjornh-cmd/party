<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Party!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="birthday-text">
        <h1>🎉 Happy Birthday! 🎉</h1>
        <div class="subtitle">Veel plezier met je dag!</div>
    </div>
    
    <div id="timer">60</div>
    
    <!-- Audio element for music -->
    <audio id="default-song" preload="auto">
        <source src="birthday.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Config Panel -->
    <div id="config-panel">
        <h2>⚙️ Instellingen</h2>
        <label>
            Naam:
            <input type="text" id="name-input" placeholder="Naam">
        </label>
        <label>
            Duur (seconden):
            <input type="number" id="duration-input" value="60" min="10" max="300">
        </label>
        <label>
            Muziek URL (optioneel):
            <input type="text" id="music-url" placeholder="https://...">
        </label>
        <button id="start-btn">Start! 🎉</button>
        <button id="close-config">Sluiten</button>
    </div>
    
    <div id="open-config">⚙️</div>

    <script src="app.js"></script>
</body>
</html>
